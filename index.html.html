<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>泉州高赞美食游路线</title>
    
    <!-- 引入 Tailwind CSS 进行极速响应式布局 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 Leaflet 地图核心库 CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- 引入 Phosphor Icons 作为界面图标补充 -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden; /* 防止原生滚动影响 APP 体验 */
            background-color: #f3f4f6;
        }

        /* 隐藏 Leaflet 的默认版权信息，让界面更清爽 */
        .leaflet-control-attribution {
            display: none !important;
        }

        /* 自定义地图气泡弹窗样式 */
        .leaflet-popup-content-wrapper {
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            padding: 0;
            overflow: hidden;
        }
        .leaflet-popup-content {
            margin: 0;
            width: 220px !important;
        }
        .leaflet-popup-tip-container {
            margin-top: -1px;
        }

        /* 底部抽屉的平滑过渡 */
        #bottom-sheet {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            /* 保证在手机端高度合适 */
            height: 55vh; 
        }

        /* 隐藏滚动条但保留滚动功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 时间轴左侧连线 */
        .timeline-line {
            position: absolute;
            left: 19px;
            top: 30px;
            bottom: -10px;
            width: 2px;
            background-color: #e5e7eb;
            z-index: 0;
        }
        .timeline-item:last-child .timeline-line {
            display: none;
        }
    </style>
</head>
<body class="relative h-screen w-screen flex flex-col">

    <!-- 地图容器：占据整个屏幕背景 -->
    <div id="map" class="absolute top-0 left-0 w-full h-full z-0"></div>

    <!-- 顶部浮动信息栏 -->
    <div class="absolute top-0 left-0 w-full z-10 p-4 pointer-events-none">
        <div class="bg-white/80 backdrop-blur-md px-5 py-3 rounded-2xl shadow-sm border border-white/50 flex justify-between items-center pointer-events-auto">
            <div>
                <h1 class="text-lg font-bold text-gray-800 tracking-tight">泉州吃游记</h1>
                <p class="text-xs text-gray-500 mt-0.5">高赞精选 · 半城烟火</p>
            </div>
            <div class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-xs font-semibold">
                端午/6月
            </div>
        </div>
    </div>

    <!-- 底部抽屉面板 -->
    <div id="bottom-sheet" class="absolute bottom-0 left-0 w-full bg-white rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.1)] z-20 flex flex-col">
        <!-- 抽屉顶部的小拉手指示器 -->
        <div class="w-full flex justify-center pt-3 pb-2">
            <div class="w-12 h-1.5 bg-gray-300 rounded-full"></div>
        </div>

        <!-- 日期切换 Tabs -->
        <div class="flex px-4 border-b border-gray-100 pb-2">
            <button onclick="switchDay(0)" id="tab-0" class="flex-1 py-2 text-center font-bold text-orange-500 border-b-2 border-orange-500 transition-colors">
                Day 1
            </button>
            <button onclick="switchDay(1)" id="tab-1" class="flex-1 py-2 text-center font-semibold text-gray-400 border-b-2 border-transparent transition-colors">
                Day 2
            </button>
            <button onclick="switchDay(2)" id="tab-2" class="flex-1 py-2 text-center font-semibold text-gray-400 border-b-2 border-transparent transition-colors">
                Day 3
            </button>
        </div>

        <!-- 时间轴列表容器 (可滚动) -->
        <div id="timeline-container" class="flex-1 overflow-y-auto no-scrollbar p-5 pb-10 relative">
            <!-- JavaScript 将动态注入这里的列表项 -->
        </div>
    </div>

    <script>
        // 结构化路线数据
        // 经纬度基于大致真实的泉州地理位置 [纬度, 经度]
        const itinerary = [
            {
                day: "Day 1",
                description: "初识古城与夜巷烟火",
                places: [
                    { name: "泉州站", time: "15:30", type: "station", latlng: [24.9450, 118.5520], desc: "高铁抵达", icon: "🚄", color: "bg-blue-500" },
                    { name: "湖心街全季酒店", time: "16:30", type: "hotel", latlng: [24.9080, 118.6010], desc: "办理入住，稍作休整", icon: "🏨", color: "bg-indigo-500" },
                    { name: "钟楼/西街", time: "17:00", type: "attraction", latlng: [24.9180, 118.5850], desc: "古城地标打卡，随便逛逛避开排队", icon: "📸", color: "bg-emerald-500" },
                    { name: "源记巷内总店", time: "18:30", type: "food", latlng: [24.9140, 118.5820], desc: "牛排/咸饭", reason: "小红书20赞点名，B站本地人说便宜好吃", icon: "🍜", color: "bg-orange-500" },
                    { name: "秉正堂四果汤", time: "20:00", type: "food", latlng: [24.9110, 118.5810], desc: "四果汤/石花膏", reason: "B站112赞、250赞攻略推荐", icon: "🍧", color: "bg-orange-500" }
                ]
            },
            {
                day: "Day 2",
                description: "非遗文化与寺庙祈福",
                places: [
                    { name: "桥尾面线糊", time: "08:30", type: "food", latlng: [24.8980, 118.5800], desc: "经典面线糊早餐", reason: "B站本地人83赞推荐说Top1", icon: "🍜", color: "bg-orange-500" },
                    { name: "泉州非遗馆", time: "09:30", type: "attraction", latlng: [24.8780, 118.6750], desc: "沉浸感受木偶戏与南音", icon: "🎭", color: "bg-emerald-500" },
                    { name: "忠记盐烧姜母鸭", time: "12:30", type: "food", latlng: [24.9200, 118.5900], desc: "硬菜正餐", reason: "B站74赞、16赞评论推荐", icon: "🦆", color: "bg-orange-500" },
                    { name: "开元寺", time: "14:30", type: "attraction", latlng: [24.9190, 118.5770], desc: "看东西塔，半城烟火半城仙", icon: "🛕", color: "bg-emerald-500" },
                    { name: "无牙海鲜馆", time: "18:00", type: "food", latlng: [24.8950, 118.5750], desc: "海鲜大排档", reason: "B站294赞推荐列店，很多人晒作业", icon: "🦀", color: "bg-orange-500" },
                    { name: "阿玲花生汤", time: "20:00", type: "food", latlng: [24.9020, 118.5830], desc: "饭后糖水", reason: "B站112赞、66赞评论提到", icon: "🥣", color: "bg-orange-500" }
                ]
            },
            {
                day: "Day 3",
                description: "闲逛拾遗与大餐收尾",
                places: [
                    { name: "泮宫卤面", time: "09:00", type: "food", latlng: [24.9050, 118.5840], desc: "古城早午餐", reason: "B站112赞，评价比网红店好", icon: "🍜", color: "bg-orange-500" },
                    { name: "蟳埔村", time: "10:30", type: "attraction", latlng: [24.8680, 118.6410], desc: "体验标志性簪花围", icon: "🌸", color: "bg-emerald-500" },
                    { name: "三脚虎", time: "12:30", type: "food", latlng: [24.8950, 118.5950], desc: "痛风锅大餐", reason: "小红书723赞、50赞评论都提到", icon: "🥘", color: "bg-orange-500" },
                    { name: "泉州站", time: "14:00", type: "station", latlng: [24.9450, 118.5520], desc: "搭乘15:00高铁返程", icon: "🚄", color: "bg-blue-500" }
                ]
            }
        ];

        let map;
        let currentDayIndex = 0;
        let routeLayerGroup;

        // 等待页面加载完成
        document.addEventListener('DOMContentLoaded', () => {
            initMap();
            renderDay(0);
        });

        function initMap() {
            // 初始化地图，中心点设为泉州，隐藏缩放控件（使用手势缩放更符合移动端习惯）
            map = L.map('map', {
                zoomControl: false,
                attributionControl: false
            }).setView([24.9080, 118.5850], 13);

            // 使用 Carto 的 Voyager 浅色现代风格底图，视觉效果非常干净，适合旅游类APP
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                maxZoom: 19,
            }).addTo(map);

            // 创建一个图层组用来装载当前的路线和点标记
            routeLayerGroup = L.layerGroup().addTo(map);
        }

        // 创建自定义的 DOM 图标
        function createCustomIcon(place) {
            return L.divIcon({
                className: 'custom-marker',
                html: `
                    <div class="${place.color} w-9 h-9 rounded-full flex items-center justify-center text-white text-lg shadow-md border-2 border-white relative transition-transform transform hover:scale-110">
                        ${place.icon}
                    </div>
                `,
                iconSize: [36, 36],
                iconAnchor: [18, 36], // 锚点在底部中心
                popupAnchor: [0, -36] // 弹窗从锚点上方弹出
            });
        }

        // 切换日期
        function switchDay(index) {
            currentDayIndex = index;
            
            // 更新 Tab 样式
            for(let i=0; i<3; i++) {
                const tab = document.getElementById(`tab-${i}`);
                if(i === index) {
                    tab.className = "flex-1 py-2 text-center font-bold text-orange-500 border-b-2 border-orange-500 transition-colors";
                } else {
                    tab.className = "flex-1 py-2 text-center font-semibold text-gray-400 border-b-2 border-transparent transition-colors";
                }
            }

            renderDay(index);
        }

        // 渲染选定日期的地图路线和下方列表
        function renderDay(index) {
            const dayData = itinerary[index];
            routeLayerGroup.clearLayers(); // 清除之前的标记和连线

            const latlngs = [];
            const bounds = L.latLngBounds();

            dayData.places.forEach((place, i) => {
                latlngs.push(place.latlng);
                bounds.extend(place.latlng);

                // 生成弹窗内容
                let popupHTML = `
                    <div class="p-4 bg-white relative">
                        <div class="text-xs font-bold text-gray-400 mb-1">${place.time}</div>
                        <h3 class="font-bold text-gray-800 text-lg mb-1">${place.name}</h3>
                        <p class="text-sm text-gray-600 mb-2">${place.desc}</p>
                `;
                
                // 如果是美食，高亮展示高赞依据
                if(place.reason) {
                    popupHTML += `
                        <div class="bg-red-50 text-red-600 p-2 rounded-lg text-xs font-medium border border-red-100 flex items-start gap-1">
                            <i class="ph-fill ph-fire text-sm mt-0.5"></i>
                            <span class="leading-relaxed">${place.reason}</span>
                        </div>
                    `;
                }
                
                // 新增：高德地图跳转按钮
                const amapUrl = getAmapLink(place.latlng[0], place.latlng[1], place.name);
                popupHTML += `
                        <div class="mt-3 flex justify-end">
                            <a href="${amapUrl}" target="_blank" class="inline-flex items-center gap-1.5 bg-blue-500 text-white px-4 py-1.5 rounded-full text-xs font-bold shadow-sm active:scale-95 transition-transform">
                                <i class="ph-bold ph-navigation-arrow"></i> 导航去这里
                            </a>
                        </div>
                    </div>
                `;

                // 创建标记
                const marker = L.marker(place.latlng, { icon: createCustomIcon(place) })
                    .bindPopup(popupHTML, {
                        closeButton: false,
                        className: 'custom-popup'
                    })
                    .addTo(routeLayerGroup);

                // 将 marker 对象保存回 place 中，方便点击列表时触发
                place.marker = marker;
            });

            // 绘制连线，使用带有虚线效果的现代折线
            const polyline = L.polyline(latlngs, {
                color: '#f97316', // tailwind orange-500
                weight: 3,
                opacity: 0.8,
                dashArray: '8, 8',
                lineJoin: 'round'
            }).addTo(routeLayerGroup);

            // 调整地图视野以包含所有标记
            if(latlngs.length > 0) {
                // 在移动端，下半部分被抽屉挡住了，所以要在底边加上 padding
                map.fitBounds(bounds, {
                    paddingTopLeft: [30, 80], // 避开顶部标题
                    paddingBottomRight: [30, window.innerHeight * 0.55 + 20], // 避开底部抽屉
                    maxZoom: 15,
                    animate: true,
                    duration: 0.5
                });
            }

            renderTimelineList(dayData);
        }

        // 渲染底部的行程时间轴
        function renderTimelineList(dayData) {
            const container = document.getElementById('timeline-container');
            let html = `
                <div class="mb-4">
                    <span class="text-xs font-bold text-orange-500 bg-orange-100 px-2 py-1 rounded-md">主题</span>
                    <span class="text-sm text-gray-600 font-medium ml-2">${dayData.description}</span>
                </div>
            `;

            dayData.places.forEach((place, i) => {
                const amapUrl = getAmapLink(place.latlng[0], place.latlng[1], place.name);
                
                html += `
                    <div class="timeline-item relative flex gap-4 mb-6 cursor-pointer" onclick="focusOnMap(${currentDayIndex}, ${i})">
                        <div class="timeline-line"></div>
                        <div class="relative z-10 w-10 h-10 ${place.color} rounded-full flex items-center justify-center text-white text-lg shadow-sm border-[3px] border-white flex-shrink-0">
                            ${place.icon}
                        </div>
                        <div class="flex-1 pt-1 pb-2 pr-2">
                            <div class="flex justify-between items-center mb-1">
                                <h4 class="font-bold text-gray-800 text-base">${place.name}</h4>
                                <span class="text-xs font-bold text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full">${place.time}</span>
                            </div>
                            <p class="text-sm text-gray-500 line-clamp-1">${place.desc}</p>
                            ${place.reason ? `<p class="text-xs text-red-500 mt-1.5 flex items-center gap-1"><i class="ph-fill ph-chat-centered-text"></i> ${place.reason}</p>` : ''}
                        </div>
                        
                        <!-- 新增：右侧独立导航按钮 (阻止事件冒泡以免触发列表点击) -->
                        <div class="flex flex-col items-center justify-start pt-1">
                            <a href="${amapUrl}" target="_blank" onclick="event.stopPropagation();" class="flex flex-col items-center justify-center w-12 h-12 text-blue-500 hover:text-blue-600 active:scale-90 transition-transform">
                                <div class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center mb-1 shadow-sm">
                                    <i class="ph-bold ph-navigation-arrow text-lg"></i>
                                </div>
                                <span class="text-[10px] font-bold">导航</span>
                            </a>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // 新增：生成唤起高德地图的 URI Link
        function getAmapLink(lat, lng, name) {
            // 高德 URI API 格式: ?to=经度,纬度,名称
            // callnative=1 表示优先唤起本地高德App，否则跳H5导航页
            // coordinate=gaode 表示经纬度坐标系为高德标准 (GCJ02)
            const amapLng = lng.toFixed(6);
            const amapLat = lat.toFixed(6);
            const encodedName = encodeURIComponent(name);
            return `https://uri.amap.com/navigation?to=${amapLng},${amapLat},${encodedName}&mode=car&policy=1&src=quanzhou_trip&coordinate=gaode&callnative=1`;
        }

        // 点击列表项，在地图上聚焦并打开弹窗
        function focusOnMap(dayIdx, placeIdx) {
            const place = itinerary[dayIdx].places[placeIdx];
            
            // 将地图平移至该点 (稍稍向上偏移以避开底部抽屉)
            // 将屏幕高度的一半转换为经纬度偏移量是一种高级技巧，这里我们利用 fitBounds 实现更稳妥的居中
            const target = L.latLng(place.latlng[0], place.latlng[1]);
            
            map.flyTo(target, 15, {
                duration: 0.5,
                easeLinearity: 0.25
            });

            // 稍微延迟后打开气泡
            setTimeout(() => {
                place.marker.openPopup();
            }, 600);
        }
    </script>
</body>
</html>
