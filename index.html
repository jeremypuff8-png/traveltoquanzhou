<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>泉州美食高赞吃游路线</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #map { height: 45vh; width: 100%; z-index: 10; position: fixed; top: 0; left: 0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        #content { margin-top: 45vh; height: 55vh; overflow-y: auto; padding-bottom: 30px; background: white; border-top-left-radius: 20px; border-top-right-radius: 20px; position: relative; z-index: 20; box-shadow: 0 -4px 15px rgba(0,0,0,0.05); }
        .timeline-line { position: absolute; left: 1.2rem; top: 2.5rem; bottom: -1rem; width: 2px; background-color: #e2e8f0; z-index: 0; }
        .timeline-item:last-child .timeline-line { display: none; }
        .leaflet-popup-content-wrapper { border-radius: 12px; padding: 0; overflow: hidden; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .leaflet-popup-content { margin: 0; width: 260px !important; }
        
        /* 隐藏Leaflet默认的Logo和缩放控件以保持界面干净 */
        .leaflet-control-attribution { display: none; }
        .leaflet-control-zoom { display: none; }
    </style>
</head>
<body>

    <!-- 顶部地图区域 -->
    <div id="map"></div>

    <!-- 底部内容区域 -->
    <div id="content" class="px-5 pt-6 pb-12">
        <!-- 天数切换 Tabs -->
        <div class="flex space-x-2 mb-6 bg-gray-100 p-1 rounded-xl" id="tabs">
            <button onclick="switchDay(0)" class="tab-btn flex-1 py-2 text-sm font-bold rounded-lg bg-white shadow-sm text-blue-600 transition-all">Day 1 (6.19)</button>
            <button onclick="switchDay(1)" class="tab-btn flex-1 py-2 text-sm font-bold rounded-lg text-gray-500 hover:text-gray-800 transition-all">Day 2 (6.20)</button>
            <button onclick="switchDay(2)" class="tab-btn flex-1 py-2 text-sm font-bold rounded-lg text-gray-500 hover:text-gray-800 transition-all">Day 3 (6.21)</button>
        </div>

        <!-- 行程列表容器 -->
        <div id="timeline-container">
            <!-- 动态渲染内容 -->
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // --- 行程数据配置 ---
        const itinerary = [
            {
                day: "Day 1",
                date: "6月19日",
                description: "初识古城与非遗木偶戏",
                places: [
                    { name: "泉州站", time: "15:30", latlng: [24.9547, 118.5528], type: "station", icon: "<i class='ph-bold ph-train'></i>", color: "bg-gray-500", desc: "抵达泉州，开启旅程" },
                    { name: "全季酒店(湖心街店)", time: "16:30", latlng: [24.9080, 118.6010], type: "hotel", icon: "<i class='ph-bold ph-bed'></i>", color: "bg-indigo-500", desc: "办理入住，放下行李稍作休息" },
                    { name: "源记巷内总店", time: "18:00", latlng: [24.9082, 118.5861], type: "food", icon: "<i class='ph-bold ph-bowl-food'></i>", color: "bg-orange-500", desc: "晚餐吃牛排和咸饭", reason: "小红书20赞评论点名；B站评论说便宜又好吃" },
                    { name: "泉州木偶剧院", time: "20:40", latlng: [24.9205, 118.5912], type: "spot", icon: "<i class='ph-bold ph-mask-happy'></i>", color: "bg-green-500", desc: "观赏1小时提线木偶表演", reason: "泉州非遗文化精髓，极具艺术张力" },
                    { name: "老蔡家牛肉", time: "22:10", latlng: [24.8950, 118.6080], type: "food", icon: "<i class='ph-bold ph-beer-bottle'></i>", color: "bg-orange-500", desc: "（可选）夜宵打卡", reason: "小红书23赞推荐：万达吃老蔡家牛肉" }
                ]
            },
            {
                day: "Day 2",
                date: "6月20日",
                description: "非遗文化与古城小吃大串联",
                places: [
                    { name: "水门国仔面线糊", time: "08:30", latlng: [24.8980, 118.5833], type: "food", icon: "<i class='ph-bold ph-bowl-food'></i>", color: "bg-orange-500", desc: "古早味早餐，记得加醋肉和油条", reason: "B站 835赞、112赞评论均强力推荐" },
                    { name: "泉州市非遗馆", time: "09:30", latlng: [24.8735, 118.6475], type: "spot", icon: "<i class='ph-bold ph-building-art'></i>", color: "bg-green-500", desc: "沉浸式感受海丝文化与民间艺术" },
                    { name: "忠记盐烧姜母鸭", time: "12:30", latlng: [24.9030, 118.5900], type: "food", icon: "<i class='ph-bold ph-cooking-pot'></i>", color: "bg-orange-500", desc: "午餐硬菜", reason: "B站 74赞、16赞评论推荐" },
                    { name: "开元寺", time: "14:30", latlng: [24.9168, 118.5815], type: "spot", icon: "<i class='ph-bold ph-camera'></i>", color: "bg-green-500", desc: "半城烟火半城仙，看东西塔" },
                    { name: "侯阿婆肉粽", time: "18:00", latlng: [24.9110, 118.5875], type: "food", icon: "<i class='ph-bold ph-bowl-food'></i>", color: "bg-orange-500", desc: "晚餐小吃第一站", reason: "东街经典老字号，泉州肉粽代表" },
                    { name: "美美阿姨醋肉", time: "19:00", latlng: [24.9015, 118.5840], type: "food", icon: "<i class='ph-bold ph-fire'></i>", color: "bg-orange-500", desc: "晚餐小吃第二站", reason: "B站 66赞评论专属定位推荐醋肉与菜粿" },
                    { name: "阿玲花生汤", time: "20:00", latlng: [24.9060, 118.5855], type: "food", icon: "<i class='ph-bold ph-coffee'></i>", color: "bg-orange-500", desc: "饭后糖水消食", reason: "B站 112赞、66赞评论均提到" }
                ]
            },
            {
                day: "Day 3",
                date: "6月21日",
                description: "闲逛拾遗与痛风大餐收尾",
                places: [
                    { name: "泮宫卤面", time: "09:00", latlng: [24.9085, 118.5835], type: "food", icon: "<i class='ph-bold ph-bowl-food'></i>", color: "bg-orange-500", desc: "早餐打卡", reason: "B站 112赞评论提到，评价比部分网红好" },
                    { name: "洛阳桥 / 蟳埔村", time: "10:00", latlng: [24.9540, 118.6720], type: "spot", icon: "<i class='ph-bold ph-camera'></i>", color: "bg-green-500", desc: "二选一：看古桥或体验簪花围" },
                    { name: "三脚虎", time: "12:00", latlng: [24.9000, 118.5950], type: "food", icon: "<i class='ph-bold ph-cooking-pot'></i>", color: "bg-orange-500", desc: "海鲜粥底/痛风锅", reason: "小红书 723赞、50赞评论双重认证" },
                    { name: "泉州站", time: "14:00", latlng: [24.9547, 118.5528], type: "station", icon: "<i class='ph-bold ph-train'></i>", color: "bg-gray-500", desc: "准备搭乘 15:00 高铁返程" }
                ]
            }
        ];

        // --- 全局变量 ---
        let map;
        let markers = [];
        let polyline;
        let currentDayIndex = 0;

        // 生成唤起高德地图的 URI Link
        function getAmapLink(lat, lng, name) {
            const amapLng = lng.toFixed(6);
            const amapLat = lat.toFixed(6);
            const encodedName = encodeURIComponent(name);
            return `https://uri.amap.com/navigation?to=${amapLng},${amapLat},${encodedName}&mode=car&policy=1&src=quanzhou_trip&coordinate=gaode&callnative=1`;
        }

        // --- 初始化地图 ---
        function initMap() {
            // 使用开源的高德风格底图
            map = L.map('map', { zoomControl: false }).setView([24.9080, 118.6010], 13);
            L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
                subdomains: ['1', '2', '3', '4'],
                maxZoom: 18,
                attribution: '© AutoNavi'
            }).addTo(map);

            renderDay(currentDayIndex);
        }

        // --- 渲染某一天的数据（地图+列表） ---
        function renderDay(dayIndex) {
            currentDayIndex = dayIndex;
            const dayData = itinerary[dayIndex];
            
            // 1. 清理旧的图层
            markers.forEach(m => map.removeLayer(m));
            if (polyline) map.removeLayer(polyline);
            markers = [];

            // 2. 绘制新的点和线
            const latlngs = [];
            const bounds = L.latLngBounds();

            dayData.places.forEach((place, i) => {
                latlngs.push(place.latlng);
                bounds.extend(place.latlng);

                // 生成气泡内容
                let popupHTML = `
                    <div class="p-4 bg-white relative">
                        <div class="text-xs font-bold text-gray-400 mb-1">${place.time}</div>
                        <h3 class="font-bold text-gray-800 text-lg mb-1">${place.name}</h3>
                        <p class="text-sm text-gray-600 mb-2">${place.desc}</p>
                `;
                
                if(place.reason) {
                    popupHTML += `
                        <div class="bg-red-50 text-red-600 p-2 rounded-lg text-xs font-medium border border-red-100 flex items-start gap-1">
                            <i class="ph-fill ph-fire text-sm mt-0.5"></i>
                            <span class="leading-relaxed">${place.reason}</span>
                        </div>
                    `;
                }

                const amapUrl = getAmapLink(place.latlng[0], place.latlng[1], place.name);
                popupHTML += `
                        <div class="mt-3 flex justify-end">
                            <a href="${amapUrl}" target="_blank" class="inline-flex items-center gap-1.5 bg-blue-500 text-white px-4 py-1.5 rounded-full text-xs font-bold shadow-sm active:scale-95 transition-transform">
                                <i class="ph-bold ph-navigation-arrow"></i> 导航去这里
                            </a>
                        </div>
                    </div>
                `;

                // 自定义 Marker 图标 (HTML + Tailwind)
                const customIcon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `
                        <div class="relative flex items-center justify-center w-8 h-8 ${place.color} text-white rounded-full shadow-md border-2 border-white -ml-4 -mt-4 transition-transform active:scale-90">
                            ${place.icon}
                        </div>
                    `,
                    iconSize: [0, 0] // 让图标居中
                });

                const marker = L.marker(place.latlng, { icon: customIcon }).addTo(map);
                marker.bindPopup(popupHTML, { offset: [0, -15] });
                markers.push(marker);
            });

            // 绘制连线
            polyline = L.polyline(latlngs, { color: '#3b82f6', weight: 4, opacity: 0.7, dashArray: '10, 10' }).addTo(map);

            // 调整地图视野以自适应当前天的点
            map.fitBounds(bounds, { padding: [40, 40], animate: true });

            // 3. 渲染底部的列表
            renderTimelineList(dayData);
            updateTabs(dayIndex);
        }

        // --- 渲染底部的行程时间轴 ---
        function renderTimelineList(dayData) {
            const container = document.getElementById('timeline-container');
            let html = `
                <div class="mb-4">
                    <span class="text-xs font-bold text-orange-500 bg-orange-100 px-2 py-1 rounded-md">行程主题</span>
                    <span class="text-sm text-gray-600 font-medium ml-2">${dayData.description}</span>
                </div>
            `;

            dayData.places.forEach((place, i) => {
                const amapUrl = getAmapLink(place.latlng[0], place.latlng[1], place.name);
                
                html += `
                    <div class="timeline-item relative flex gap-4 mb-6 cursor-pointer" onclick="focusOnMap(${i})">
                        <div class="timeline-line"></div>
                        <div class="relative z-10 w-10 h-10 ${place.color} rounded-full flex items-center justify-center text-white text-lg shadow-sm border-[3px] border-white flex-shrink-0">
                            ${place.icon}
                        </div>
                        <div class="flex-1 pt-1 pb-2 pr-2">
                            <div class="flex justify-between items-center mb-1">
                                <h4 class="font-bold text-gray-800 text-base">${place.name}</h4>
                                <span class="text-xs font-bold text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full">${place.time}</span>
                            </div>
                            <p class="text-sm text-gray-500 line-clamp-2">${place.desc}</p>
                            ${place.reason ? `<p class="text-xs text-red-500 mt-1.5 flex items-start gap-1"><i class="ph-fill ph-chat-centered-text mt-0.5"></i> <span>${place.reason}</span></p>` : ''}
                        </div>
                        
                        <!-- 右侧导航按钮 -->
                        <div class="flex flex-col items-center justify-start pt-1">
                            <a href="${amapUrl}" target="_blank" onclick="event.stopPropagation();" class="flex flex-col items-center justify-center w-12 h-12 text-blue-500 hover:text-blue-600 active:scale-90 transition-transform">
                                <div class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center mb-1 shadow-sm">
                                    <i class="ph-bold ph-navigation-arrow text-lg"></i>
                                </div>
                                <span class="text-[10px] font-bold">导航</span>
                            </a>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // --- 切换天数逻辑 ---
        function switchDay(index) {
            renderDay(index);
        }

        // --- 更新 Tab 样式 ---
        function updateTabs(activeIndex) {
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach((btn, i) => {
                if (i === activeIndex) {
                    btn.classList.add('bg-white', 'shadow-sm', 'text-blue-600');
                    btn.classList.remove('text-gray-500');
                } else {
                    btn.classList.remove('bg-white', 'shadow-sm', 'text-blue-600');
                    btn.classList.add('text-gray-500');
                }
            });
        }

        // --- 点击列表定位地图 ---
        function focusOnMap(markerIndex) {
            const marker = markers[markerIndex];
            if(marker) {
                // 平滑移动地图并放大
                map.flyTo(marker.getLatLng(), 15, { duration: 1.5 });
                // 稍微延时后打开气泡
                setTimeout(() => {
                    marker.openPopup();
                }, 800);
            }
        }

        // 页面加载完毕后初始化
        window.onload = initMap;
    </script>
</body>
</html>
